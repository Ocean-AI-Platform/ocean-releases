<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta name="googlebot" content="noindex, nofollow, noarchive">
  <title>Ocean Next 6 Months Plan</title>
  <meta name="description" content="Ocean internal six-month product plan.">
  <link rel="icon" type="image/png" href="../favicon.png">
  <style>
    :root {
      color-scheme: light dark;
      --page: #ffffff;
      --text: #18181b;
      --muted: #52525b;
      --border: #e4e4e7;
      --link: #0369a1;
      --code: #f4f4f5;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --page: #101014;
        --text: #f4f4f5;
        --muted: #a1a1aa;
        --border: #27272a;
        --link: #67e8f9;
        --code: #18181b;
      }
    }

    body {
      margin: 0;
      padding: 40px 20px 64px;
      background: var(--page);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.65;
    }

    main {
      max-width: 860px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: baseline;
      border-bottom: 1px solid var(--border);
      padding-bottom: 14px;
      margin-bottom: 30px;
    }

    header p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    h1,
    h2,
    h3 {
      line-height: 1.2;
      letter-spacing: 0;
      margin: 1.6em 0 0.55em;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.3rem);
      margin-top: 0;
    }

    h2 {
      font-size: 1.55rem;
      border-top: 1px solid var(--border);
      padding-top: 1.2rem;
    }

    h3 {
      font-size: 1.18rem;
    }

    p {
      margin: 0 0 1rem;
    }

    ul {
      padding-left: 1.35rem;
      margin: 0 0 1.4rem;
    }

    li {
      margin: 0.35rem 0;
    }

    code {
      background: var(--code);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.1rem 0.28rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.92em;
    }

    .loading,
    .error {
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      white-space: pre-wrap;
    }

    @media (max-width: 640px) {
      body {
        padding: 28px 16px 48px;
      }

      header {
        display: block;
      }

      header p + p {
        margin-top: 8px;
      }
    }
  </style>
</head>

<body>
  <main>
    <header>
      <p>Markdown reader</p>
      <p><a href="roadmap.md">Open roadmap.md</a></p>
    </header>
    <article id="content" class="loading">Loading roadmap.md...</article>
  </main>

  <script>
    const content = document.getElementById("content");

    function escapeHtml(value) {
      return value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function renderInline(value) {
      return escapeHtml(value)
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/_([^_]+)_/g, "<em>$1</em>")
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
    }

    function renderMarkdown(markdown) {
      const lines = markdown.replace(/\r\n/g, "\n").split("\n");
      let html = "";
      let paragraph = [];
      let inList = false;

      function flushParagraph() {
        if (!paragraph.length) return;
        html += `<p>${renderInline(paragraph.join(" "))}</p>`;
        paragraph = [];
      }

      function closeList() {
        if (!inList) return;
        html += "</ul>";
        inList = false;
      }

      for (const line of lines) {
        const heading = line.match(/^(#{1,3})\s+(.+)$/);
        const listItem = line.match(/^-\s+(.+)$/);

        if (!line.trim()) {
          flushParagraph();
          closeList();
          continue;
        }

        if (heading) {
          flushParagraph();
          closeList();
          const level = heading[1].length;
          html += `<h${level}>${renderInline(heading[2])}</h${level}>`;
          continue;
        }

        if (listItem) {
          flushParagraph();
          if (!inList) {
            html += "<ul>";
            inList = true;
          }
          html += `<li>${renderInline(listItem[1])}</li>`;
          continue;
        }

        paragraph.push(line.trim());
      }

      flushParagraph();
      closeList();
      return html;
    }

    fetch("roadmap.md", { cache: "no-cache" })
      .then((response) => {
        if (!response.ok) throw new Error(`Unable to load roadmap.md (${response.status})`);
        return response.text();
      })
      .then((markdown) => {
        content.className = "";
        content.innerHTML = renderMarkdown(markdown);
      })
      .catch((error) => {
        content.className = "error";
        content.textContent = error.message;
      });
  </script>
</body>

</html>
